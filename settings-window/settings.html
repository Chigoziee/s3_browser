<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Settings — S3 Browser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 28px 32px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #cba6f7;
    }
    p.subtitle {
      font-size: 12px;
      color: #6c7086;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #a6adc8;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      font-size: 13px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #cba6f7; }
    input::placeholder { color: #585b70; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .actions {
      margin-top: auto;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    button {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    .btn-cancel {
      background: #313244;
      color: #a6adc8;
    }
    .btn-cancel:hover { background: #45475a; }
    .btn-save {
      background: #cba6f7;
      color: #1e1e2e;
    }
    .btn-save:hover { background: #b4befe; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      font-size: 12px;
      color: #f38ba8;
      margin-top: -10px;
      margin-bottom: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>AWS Credentials</h1>
  <p class="subtitle">Credentials are stored locally on your machine and never shared.</p>

  <label for="accessKeyId">Access Key ID</label>
  <input type="text" id="accessKeyId" placeholder="AKIAIOSFODNN7EXAMPLE" autocomplete="off" spellcheck="false" />

  <label for="secretAccessKey">Secret Access Key</label>
  <input type="password" id="secretAccessKey" placeholder="wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" autocomplete="off" />

  <div class="row">
    <div>
      <label for="region">Region</label>
      <input type="text" id="region" placeholder="us-east-1" autocomplete="off" spellcheck="false" />
    </div>
    <div>
      <label for="bucket">Bucket Name</label>
      <input type="text" id="bucket" placeholder="my-bucket-name" autocomplete="off" spellcheck="false" />
    </div>
  </div>

  <div class="error" id="error-msg"></div>

  <div class="actions">
    <button class="btn-cancel" id="btn-cancel">Cancel</button>
    <button class="btn-save" id="btn-save">Save &amp; Continue</button>
  </div>

  <script src="settings.js"></script>
</body>
</html>
